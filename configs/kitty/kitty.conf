map f1 new_tab_with_cwd lazygit
map f2 new_tab_with_cwd lazydocker
map f3 new_tab_with_cwd k9s
map f4 new_tab_with_cwd 
map f5 new_tab_with_cwd helix-markdown-preview $PWD

modify_font underline_position 25

# font_family IosevkaTerm Nerd Font Mono
# font_family FiraCode Nerd Font Mono
font_family JetBrains Mono
# font_family ComicShannsMono Nerd Font
font_size 18
disable_ligatures cursor
background_opacity 1
shell_integration disabled
# repaint_delay 4
# input_delay 3
cursor_shape block
confirm_os_window_close 0
cursor #f0f0f0
cursor_text_color #ffffff
cursor_shape block
cursor_blink_interval 0.5
cursor_stop_blinking_after 0
scrollback_lines 5000
url_color #0f0f0f
url_style single
sync_to_monitor yes
enable_audio_bell no

# window_padding_width 0
window_padding_width 10

include ./current-theme.conf
// include ./everforest.conf
// include ./github-theme.conf
// include ./gruv.conf
// include ./monokai-pro.conf

# border on gnome + wayland
# linux_display_server x11
