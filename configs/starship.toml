format = '''
$username$hostname$directory $git_status $battery$kubernetes
[>](dimmed blue bold) ''' # there has to be a another way #TODO

[kubernetes]
format = ' [$context](dimmed blue) '
disabled = false
detect_files = ['.k8s']

[username]
style_user = 'dimmed blue bold'
style_root = 'black bold'
format = '[$user]($style)'
disabled = false
show_always = true

[hostname]
ssh_only = true
format = '(bold blue)@[$hostname](bold red)'
trim_at = '.companyname.com'
disabled = false

[directory]
style = 'dimmed green'
format = ' [$path]($style)'
truncation_length = 8
truncation_symbol = '…/'

[[battery.display]]
threshold = 50
style = 'dimmed yellow'

